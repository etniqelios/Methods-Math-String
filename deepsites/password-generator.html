<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Xgen: Generate password</title>
    <link rel="stylesheet" href="../css/design.css">
    <link rel="stylesheet" href="../css/media.css">
    <link rel="stylesheet" href="../css/keyframes.css">

    <!-- SYMBOLS/EMOTICONS PACK -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="../icon/icon-2.ico">
</head>
<body>
    <div id="root">

        <!-- PC VERSION MENU -->
        <div class="--navigation prevent-select">

            <div class="--navigation-header">Menu option</div>

            <a class="--navigation-button" style="background-color: var(--color-600); border-left: 5px solid white;" href="#">
                <span class="emoticon-blue">
                    <i class="fa-solid fa-key" style="color: white"></i>
                </span>
                <span class="text-content-button" id="location-name"></span>
            </a>

            <a class="--navigation-button" href="../index.html">
                <span class="emoticon-blue">
                    <i class="fa-solid fa-house"></i>
                </span>
                <span class="text-content-button">Index</span>
            </a>

            <div style="width: auto; height: 50px;"></div>

            <a class="--navigation-button" id="bookmark-1">
                <span class="emoticon-yellow">
                    <i class="fa-solid fa-cube"></i>
                </span>
                <span class="text-content-button">Passwords</span>
            </a>

            <a class="--navigation-button"   id="bookmark-2">
                <span class="emoticon-yellow">
                    <i class="fa-solid fa-cube"></i>
                </span>
                <span class="text-content-button">-</span>
            </a>


            <!-- ALL PC LINKS -->

            <div class="--navigation-background-panel">
                <div class="--navigation-gui-info">
                    <span id="version-pc"></span>
                </div>
            </div>

        </div>

        <!-- MOBLIE VERSION MENU -->
        <div class="--navigation-moblie prevent-select" id="window-menu">

            <div class="--navigation-mobile-header">Menu option</div>

            <div class="--navigation-mobile-close-button" onclick="MenuClose()">
                <i class="fa-solid fa-close"></i>
                <span class="text-content-button">Close menu</span>
            </div>

            <a class="--navigation-mobile-button" style="background-color: var(--color-600); border-left: 5px solid white;" href="#">
                <span class="emoticon-blue">
                    <i class="fa-solid fa-circle" style="color: white"></i>
                </span>
                <span class="text-content-button" id="mobile-location-name"></span>
            </a>

            <a class="--navigation-mobile-button" href="../index.html">
                <span class="emoticon-blue">
                    <i class="fa-solid fa-house"></i>
                </span>
                <span class="text-content-button">Index</span>
            </a>

            <div style="width: auto; height: 50px;"></div>

            <a class="--navigation-mobile-button" id="bookmark-mobile-1">
                <span class="emoticon-yellow">
                    <i class="fa-solid fa-cube"></i>
                </span>
                <span class="text-content-button">Passwords</span>
            </a>

            <a class="--navigation-mobile-button" id="bookmark-mobile-2">
                <span class="emoticon-yellow">
                    <i class="fa-solid fa-cube"></i>
                </span>
                <span class="text-content-button">-</span>
            </a>

            <!-- ALL MOBLIE LINKS -->

            <div class="--navigation-mobile-gui-info">
                <span id="version-mobile"></span>
            </div>

        </div>

        <!-- XGEN-INATOR -->
        <div class="--xgen-inator-page">
            <div class="--xgen-container" id="page-1" style="display: block">
                <div class="--page-header-box prevent-select">
                    <i class="fa-solid fa-key --header-box-float-right" style="color: white;"></i>
                    <div class="--navigation-mobile-open-button" onclick="MenuOpen()">
                        <i class="fa-solid fa-book"></i>
                    </div>
                </div>
                <div class="prevent-select">
                    <p>Choose option and generate strong password</p>
                </div>
                <div class="--page-option-box">
                    <div class="prevent-select">
                        <div class="--label-margin">
                            <label><input type="checkbox" id="letters-enabled">
                                <span>: letters </span>
                                <span class="box-info">a-z</span>
                            </label>
                            <select class="prevent-select" id="select-option">
                                <option value="1" default>&#8595; small</option>
                                <option value="2">&#8593; big</option>
                                <option value="3">⚄ mixed</option>
                            </select>
                        </div>
                        <div class="--label-margin">
                            <label>
                                <input type="checkbox" id="numbers-enabled" class="prevent-select">
                                <span>: numbers </span>
                                <span class="box-info">0-9</span>
                            </label>
                        </div>
                        <div class="--label-margin">
                            <label>
                                <input type="checkbox" id="symbols-enabled" class="prevent-select">
                                <span>: symbols </span><span class="box-info">!,@,#...</span>
                            </label>
                        </div>
                        <div class="--label-margin">
                            <label>char value :
                                <input type="number" min="1" max="999" value="12" id="max-lenght">
                            </label>
                        </div>
                        <div class="--label-margin">
                            <label>
                                <input type="checkbox" id="enable-huge-gen"><span> : higher password </span><span class="box-info">40+</span>
                            </label>
                        </div>
                        <p>Sequnece:</p>
                        <div class="box-text" id="sequence-gen-show"></div>
                        <br>
                        <br>
                    </div>7
                    <div class="box-text" id="password-output">Output will show here</div>
                    <span class="box-comment prevent-select" id="password-info"></span>
                </div>
                <div class="--page-footer-box prevent-select">
                    <button onclick="TryGeneratePass()">Generate</button>
                </div>
            </div>

             <div class="--index-container" id="page-2" style="display: none">
                <div class="--index-page-header-box prevent-select">
                    <i class="fa-solid fa-key --header-box-float-right" style="color: white;"></i>
                    <div class="--navigation-mobile-open-button" onclick="MenuOpen()">
                        <i class="fa-solid fa-book"></i>
                    </div>
                </div>

                <div class="--index-content-box prevent-select">
                    <h3>Generate something </h3>
                    <p>I don't know yet what</p>
                    <hr>
                </div>
            </div>

        </div>
        <!-- SCRIPTS -->
        <script src="../js/generate-password.js"></script>
        <script src="../js/infos.js"></script>
        <script src="../js/toggle-menu.js"></script>
        <script src="../js/title-reader.js"></script>
        <script src="../js/two-change-page.js"></script>
        >
        <div class="--footer prevent-select"></div>
    </div>
</body>
</html>
